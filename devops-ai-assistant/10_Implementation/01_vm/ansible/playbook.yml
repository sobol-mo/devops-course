---
- name: Налаштування сервера для training-project
  hosts: all
  become: yes

  vars:
    app_user: training
    app_home: /home/training
    app_dir: /opt/training-app
    # ТУТ ТВІЙ USERNAME
    app_repo: "https://github.com/Apolinaria1705/devops-course.git"

  tasks:
    - name: 7. Створити користувача для додатку
      user:
        name: "{{ app_user }}"
        shell: /bin/bash
        create_home: yes
        home: "{{ app_home }}"
        groups: []
        state: present

    - name: 8. Встановити необхідні пакети
      apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-venv
          - acl
        state: present
        update_cache: yes

    - name: 9a. Створити директорію додатку
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: 9b. Створити директорію для конфігурації
      file:
        path: "{{ app_home }}/.config"
        state: directory
        owner: "{{ app_user }}"
        mode: '0700'

    - name: 10a. Клонувати репозиторій training-project
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main
      become_user: "{{ app_user }}"

    - name: 10b. Створити файл .env
      copy:
        content: "PORT=5000\n"
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        mode: '0600'

    - name: 10c. Створити requirements.txt на сервері
      copy:
        content: "flask\n"
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        mode: '0644'

    - name: 11. Встановити Python-залежності додатку
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: "/usr/bin/python3 -m venv"
      become_user: "{{ app_user }}"
      tags: [always]
    - name: Скопіювати unit-файл сервісу
      copy:
        src: training-app.service
        dest: /etc/systemd/system/training-app.service
        owner: root
        group: root
        mode: '0644'
      notify:
        - Reload systemd
        - Restart training-app

    - name: Активувати автозапуск сервісу
      systemd:
        name: training-app
        enabled: yes

    - name: Запустити сервіс
      systemd:
        name: training-app
        state: started
  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Restart training-app
      systemd:
        name: training-app
        state: restarted